name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create GitHub releases

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build the distributable binary with Nix
  # ──────────────────────────────────────────────────────────────────────────
  nix-build:
    name: Nix build (${{ github.ref_name }})
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: nix build .
        run: nix build . --out-link result

      - name: Package binary archive
        run: |
          ARCHIVE="nixman-${{ github.ref_name }}-x86_64-linux.tar.gz"
          tar -czf "$ARCHIVE" -C result/bin nixman
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixman-binary
          path: |
            nixman-*.tar.gz
            nixman-*.tar.gz.sha256

  # ──────────────────────────────────────────────────────────────────────────
  # Create a GitHub release with auto-generated changelog
  # ──────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: nix-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nixman-binary

      - name: Generate changelog from git log
        id: changelog
        run: |
          # Collect commits since the previous tag (or initial commit if first release)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${{ github.ref_name }}"
          else
            RANGE="${{ github.ref_name }}"
          fi

          CHANGELOG=$(git log "$RANGE" \
            --pretty=format:"- %s (%h)" \
            --no-merges)

          # Write to a file to preserve newlines in subsequent steps
          echo "$CHANGELOG" > CHANGELOG_RELEASE.md
          cat CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "nixman ${{ github.ref_name }}"
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            nixman-*.tar.gz
            nixman-*.tar.gz.sha256
